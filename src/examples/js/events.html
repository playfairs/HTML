<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Events</title>
    <style>
        .container {
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .box {
            width: 200px;
            height: 200px;
            background: #666;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .box:hover {
            background: #444;
        }
        input {
            padding: 10px;
            margin: 5px 0;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .log {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JavaScript Events</h1>
        
        <div class="box" id="clickBox">
            Click me.
        </div>
        
        <input type="text" id="textInput" placeholder="Type something here...">
        
        <button id="mouseButton">Mouse Events</button>
        <button id="keyboardButton">Keyboard Events</button>
        
        <div id="log" class="log">Event log will appear here...</div>
    </div>

    <script>
        const log = document.getElementById('log');
        const clickBox = document.getElementById('clickBox');
        const textInput = document.getElementById('textInput');
        const mouseButton = document.getElementById('mouseButton');
        const keyboardButton = document.getElementById('keyboardButton');
        
        function addLog(message) {
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `[${time}] ${message}<br>`;
            log.scrollTop = log.scrollHeight;
        }
        
        clickBox.addEventListener('click', function() {
            this.style.background = '#' + Math.floor(Math.random()*16777215).toString(16);
            addLog('Box clicked! Color changed.');
        });
        
        clickBox.addEventListener('dblclick', function() {
            this.textContent = 'Double clicked!';
            addLog('Box double clicked!');
        });
        
        textInput.addEventListener('input', function() {
            addLog(`Input changed: "${this.value}"`);
        });
        
        textInput.addEventListener('focus', function() {
            this.style.borderColor = '#666';
            addLog('Input focused');
        });
        
        textInput.addEventListener('blur', function() {
            this.style.borderColor = '#ccc';
            addLog('Input lost focus');
        });
        
        mouseButton.addEventListener('mouseenter', function() {
            addLog('Mouse entered button');
        });
        
        mouseButton.addEventListener('mouseleave', function() {
            addLog('Mouse left button');
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                addLog('Ctrl+Enter pressed!');
            }
        });
        
        keyboardButton.addEventListener('click', function() {
            addLog('Click this button and press any key to see keyboard events...');
        });
        
        document.addEventListener('keypress', function(e) {
            if (document.activeElement === keyboardButton) {
                addLog(`Key pressed: "${e.key}"`);
            }
        });
        
        window.addEventListener('resize', function() {
            addLog(`Window resized: ${window.innerWidth}x${window.innerHeight}`);
        });
    </script>
</body>
</html>
