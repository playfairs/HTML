<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic DOM Manipulation</title>
    <style>
        .container {
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        button {
            margin: 5px;
            padding: 10px 15px;
            background: #666;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #444;
        }
        .highlight {
            background: yellow;
            padding: 2px 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">DOM Manipulation</h1>
        <p id="paragraph">This paragraph will be modified by JavaScript.</p>
        
        <button onclick="changeText()">Change Text</button>
        <button onclick="addElement()">Add Element</button>
        <button onclick="changeStyle()">Change Style</button>
        <button onclick="removeElement()">Remove Element</button>
        
        <div id="content"></div>
    </div>

    <script>
        function changeText() {
            document.getElementById('title').textContent = 'Title Changed!';
            document.getElementById('paragraph').innerHTML = 'Paragraph <span class="highlight">modified</span> with JavaScript!';
        }
        
        function addElement() {
            const content = document.getElementById('content');
            const newDiv = document.createElement('div');
            newDiv.textContent = 'New element added at ' + new Date().toLocaleTimeString();
            newDiv.style.margin = '10px 0';
            newDiv.style.padding = '10px';
            newDiv.style.background = '#f0f0f0';
            content.appendChild(newDiv);
        }
        
        function changeStyle() {
            const title = document.getElementById('title');
            title.style.color = title.style.color === 'red' ? '#333' : 'red';
            title.style.fontSize = title.style.fontSize === '3em' ? '2em' : '3em';
        }
        
        function removeElement() {
            const content = document.getElementById('content');
            if (content.lastChild) {
                content.removeChild(content.lastChild);
            }
        }
    </script>
</body>
</html>
