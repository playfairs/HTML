<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semantic HTML5</title>
    <style>
        header, nav, main, footer, article, section, aside {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 5px 0;
        }
        header { background: #f0f0f0; }
        nav { background: #e8e8e8; }
        footer { background: #f0f0f0; }
    </style>
</head>
<body>
    <header>
        <h1>Website Title</h1>
        <p>Website description</p>
    </header>
    
    <nav>
        <ul>
            <li><a href="https://github.com/playfairs/HTML">Source Code</a></li>
            <li><a href="https://playfairs.github.io">About</a></li>
            <li><a href="mailto:root@playfairs.cc">Contact</a></li>
        </ul>
    </nav>
    
    <main>
        <article>
            <h2>Article Title</h2>
            <p>This is the main content of the article.</p>
            <section>
                <h3>Section 1</h3>
                <p>Content for section 1.</p>
            </section>
            <section>
                <h3>Section 2</h3>
                <p>Content for section 2.</p>
            </section>
        </article>
        
        <aside>
            <h3>Sidebar</h3>
            <p>Additional information or links.</p>
        </aside>
    </main>
    
    <footer>
        <p>&copy; 2025 Some Website. No rights reserved.</p>
    </footer>
</body>
</html>
