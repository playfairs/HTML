<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Formatting</title>
</head>
<body>
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    
    <p>This is a <strong>bold</strong> text.</p>
    <p>This is an <em>italic</em> text.</p>
    <p>This is <u>underlined</u> text.</p>
    <p>This is <mark>highlighted</mark> text.</p>
    
    <p>You can use <code>code</code> for inline code.</p>
    
    <blockquote>
        This is a blockquote for quotes.
    </blockquote>
</body>
</html>
