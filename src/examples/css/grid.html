<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Grid</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            background: #e0e0e0;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        .grid-item {
            background: #666;
            color: white;
            padding: 20px;
            border-radius: 4px;
            text-align: center;
        }
        
        .grid-2x2 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }
        
        .grid-layout {
            grid-template-areas: 
                "header header"
                "sidebar main"
                "footer footer";
            grid-template-columns: 200px 1fr;
            grid-template-rows: auto 1fr auto;
        }
        
        .header { grid-area: header; background: #444; }
        .sidebar { grid-area: sidebar; background: #555; }
        .main { grid-area: main; background: #666; }
        .footer { grid-area: footer; background: #444; }
    </style>
</head>
<body>
    <h2>CSS Grid Examples</h2>
    
    <h3>Basic Grid (3x3)</h3>
    <div class="grid-container">
        <div class="grid-item">1</div>
        <div class="grid-item">2</div>
        <div class="grid-item">3</div>
        <div class="grid-item">4</div>
        <div class="grid-item">5</div>
        <div class="grid-item">6</div>
        <div class="grid-item">7</div>
        <div class="grid-item">8</div>
        <div class="grid-item">9</div>
    </div>
    
    <h3>Layout Grid</h3>
    <div class="grid-container grid-layout">
        <div class="grid-item header">Header</div>
        <div class="grid-item sidebar">Sidebar</div>
        <div class="grid-item main">Main Content</div>
        <div class="grid-item footer">Footer</div>
    </div>
</body>
</html>
